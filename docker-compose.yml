# Optional dev stack: API + both Vite dev servers.
# Before first run: `cp .env.docker.example .env.docker` and set secrets / overrides there.
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Root only for bootstrap: bind-mount hides the image .venv, so we sync into the
    # named volume, fix ownership, then exec the server as UID 1000 (matches Dockerfile user).
    user: "0:0"
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - duopus-sqlite:/data
      - ./backend:/app
      - backend-venv:/app/.venv
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /app/.venv /data
        uv sync --frozen --no-install-project --no-dev
        chown -R 1000:1000 /app/.venv /data
        exec runuser -u app -g app -- uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 45s

  rundown-ui:
    image: node:22-bookworm-slim
    working_dir: /app
    environment:
      DUOPUS_API_PROXY: http://api:8000
    volumes:
      - ./frontend/rundown-ui:/app
      - rundown-ui-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

  prompter:
    image: node:22-bookworm-slim
    working_dir: /app
    environment:
      DUOPUS_API_PROXY: http://api:8000
    volumes:
      - ./frontend/prompter:/app
      - prompter-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5174"
    depends_on:
      api:
        condition: service_healthy

volumes:
  duopus-sqlite:
  backend-venv:
  rundown-ui-node-modules:
  prompter-node-modules:
