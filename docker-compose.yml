# Runtime configuration: use a project `.env` file (Compose loads it automatically for
# variable substitution) or export variables in your shell. Defaults below are for local
# development only — override secrets for any shared or production deployment.
#
# Prebuilt images (after CI publishes to GHCR): override with DUOPUS_*_IMAGE or run
# `docker compose build` to build from source instead of pulling.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-duopus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-duopus_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-duopus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${DUOPUS_BACKEND_IMAGE:-ghcr.io/tojemoc/duopus-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-postgresql+psycopg://duopus:duopus_local_dev@db:5432/duopus}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      VMIX_HOST: ${VMIX_HOST:-host.docker.internal}
      SECRET_KEY: ${SECRET_KEY:-dev-only-not-for-production-use-min-32-chars}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8000:8000"

  nginx:
    image: ${DUOPUS_NGINX_IMAGE:-ghcr.io/tojemoc/duopus-nginx:latest}
    build:
      context: .
      dockerfile: Dockerfile.nginx
    depends_on:
      - backend
    ports:
      - "80:8080"

volumes:
  pgdata:
