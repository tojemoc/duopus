name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      POSTGRES_USER: duopus
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: duopus
      # Required by compose for the backend service; used by Alembic when the full stack runs.
      POSTGRES_URL: postgresql+psycopg://duopus:ci@db:5432/duopus
      SECRET_KEY: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-12
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.14"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Run backend tests
        working-directory: backend
        run: uv sync --locked --extra dev && uv run pytest

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build Compose images
        run: docker compose build
